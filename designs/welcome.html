<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-8">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center">
    <div class="w-14 h-14 mx-auto mb-5 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
      <span class="text-white text-2xl">✦</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Local Design Canvas</h1>
    <p class="text-slate-500 leading-relaxed mb-6">
      Đây là thiết kế mẫu. Trong Claude Code, chạy
      <code class="bg-slate-100 text-indigo-600 px-1.5 py-0.5 rounded text-sm">/design</code>
      kèm mô tả UI của bạn để tạo thiết kế mới. Kết quả sẽ hiện ngay trên canvas này.
    </p>
    <div class="flex gap-3 justify-center">
      <button class="px-5 py-2.5 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition">Bắt đầu</button>
      <button class="px-5 py-2.5 rounded-lg bg-slate-100 text-slate-700 font-medium hover:bg-slate-200 transition">Tài liệu</button>
    </div>
  </div>
</body>
</html>
